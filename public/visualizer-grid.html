<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iMade — Audio Visualizer Modes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 480px);
    grid-template-rows: repeat(3, 320px);
    gap: 6px;
    padding: 6px;
    background: #0d0d1a;
  }
  .cell {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
  }
  .cell canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .cell .label {
    position: absolute;
    bottom: 10px;
    left: 12px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.5px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<script>
const MODES = [
  'Bars', 'Radial', 'Wave',
  'EQ', 'Spectrograph', 'Orbit',
  'Sphere', 'Grid', 'Laser'
];

const DPR = window.devicePixelRatio || 1;
const CW = 480, CH = 320;
const cells = [];

// Build DOM
const grid = document.getElementById('grid');
for (const mode of MODES) {
  const div = document.createElement('div');
  div.className = 'cell';
  const canvas = document.createElement('canvas');
  canvas.width = CW * DPR;
  canvas.height = CH * DPR;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  div.appendChild(canvas);
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = mode;
  div.appendChild(label);
  grid.appendChild(div);
  cells.push({ mode, canvas, ctx, state: {} });
}

// --- Simulated audio data ---
function generateFreqData(t) {
  const data = new Uint8Array(256);
  const beat = (Math.sin(t * 3.5) * 0.5 + 0.5);
  const kick = Math.pow(Math.max(0, Math.sin(t * 3.5)), 4) * 0.6;
  for (let i = 0; i < 256; i++) {
    const f = i / 256;
    const bassShape = Math.exp(-i / 25) * (0.5 + kick * 0.8);
    const midShape = Math.exp(-Math.pow((i - 40) / 30, 2)) * 0.4 * (0.6 + Math.sin(t * 2.1) * 0.3);
    const highShape = Math.exp(-Math.pow((i - 90) / 50, 2)) * 0.25 * (0.5 + Math.sin(t * 5.3 + 1) * 0.3);
    const detail = Math.sin(i * 0.8 + t * 4) * 0.06 + Math.sin(i * 1.7 + t * 7) * 0.04;
    const noise = (Math.sin(i * 13.7 + t * 17.3) * 0.5 + 0.5) * 0.05 * Math.exp(-i / 100);
    const val = (bassShape + midShape + highShape + detail + noise) * beat * 255;
    data[i] = Math.min(255, Math.max(0, val));
  }
  return data;
}

function generateTimeData(t) {
  const len = 1024;
  const data = new Uint8Array(len);
  for (let i = 0; i < len; i++) {
    const phase = i / len * Math.PI * 2;
    const val = 128 +
      Math.sin(phase * 3 + t * 5.5) * 35 +
      Math.sin(phase * 7 + t * 3.2) * 18 +
      Math.sin(phase * 13 + t * 8.1) * 9 +
      Math.sin(phase * 23 + t * 12) * 5 +
      (Math.sin(i * 7.1 + t * 19) * 3);
    data[i] = Math.min(255, Math.max(0, val));
  }
  return data;
}

// --- Drawing functions (adapted from app) ---

function drawBackground(ctx, w, h, t, freqData) {
  ctx.clearRect(0, 0, w, h);
  const hue1 = 262 + Math.sin(t * 0.2) * 8;
  const hue2 = 268 + Math.sin(t * 0.15 + 1) * 6;
  let lowSum = 0, highSum = 0;
  const half = Math.floor(freqData.length / 2);
  for (let i = 0; i < half; i++) lowSum += freqData[i];
  for (let i = half; i < freqData.length; i++) highSum += freqData[i];
  const lowAvg = lowSum / half / 255;
  const highAvg = highSum / (freqData.length - half) / 255;
  const freqShift = highAvg - lowAvg;
  const lc = 11 + freqShift * 6;
  const lm = 7 + freqShift * 4;
  const le = 5 + freqShift * 3;
  const bgGrad = ctx.createRadialGradient(w * 0.3, h * 0.3, 0, w * 0.5, h * 0.5, Math.max(w, h) * 0.8);
  bgGrad.addColorStop(0, `hsla(${hue1}, 28%, ${lc}%, 1)`);
  bgGrad.addColorStop(0.5, `hsla(${hue2}, 22%, ${lm}%, 1)`);
  bgGrad.addColorStop(1, `hsla(${hue1 + 5}, 18%, ${le}%, 1)`);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);
}

function drawBars(ctx, w, h, data) {
  const barCount = 48;
  const margin = w * 0.08;
  const usableW = w - margin * 2;
  const totalGap = usableW * 0.15;
  const gap = totalGap / (barCount + 1);
  const barW = (usableW - totalGap) / barCount;
  ctx.shadowColor = 'rgba(129,140,248,0.35)';
  ctx.shadowBlur = 16;
  for (let i = 0; i < barCount; i++) {
    const maxBin = Math.floor(data.length * 0.68);
    const center = Math.floor(i * maxBin / barCount);
    const span = Math.max(1, Math.floor(maxBin / barCount / 2));
    let sum = 0, count = 0;
    for (let j = Math.max(0, center - span); j <= Math.min(data.length - 1, center + span); j++) { sum += data[j]; count++; }
    const val = Math.pow((sum / count) / 255, 0.75);
    const barH = val * h * 0.85;
    const x = margin + gap + i * (barW + gap);
    const pct = i / barCount;
    const rC = Math.floor(80 + pct * 120);
    const gC = Math.floor(60 + pct * 130);
    const bC = Math.floor(200 + pct * 55);
    const topR = Math.min(255, rC + 40);
    const topG = Math.min(255, gC + 50);
    const topB = Math.min(255, bC + 20);
    const grad = ctx.createLinearGradient(x, h, x, h - barH);
    grad.addColorStop(0, `rgba(${rC},${gC},${bC},0.9)`);
    grad.addColorStop(1, `rgba(${topR},${topG},${topB},0.7)`);
    ctx.fillStyle = grad;
    const r = Math.min(barW / 2, 6);
    ctx.beginPath();
    ctx.moveTo(x, h);
    ctx.lineTo(x, h - barH + r);
    ctx.quadraticCurveTo(x, h - barH, x + r, h - barH);
    ctx.lineTo(x + barW - r, h - barH);
    ctx.quadraticCurveTo(x + barW, h - barH, x + barW, h - barH + r);
    ctx.lineTo(x + barW, h);
    ctx.closePath();
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawRadial(ctx, w, h, data) {
  const cx = w / 2, cy = h / 2;
  const innerR = Math.min(w, h) * 0.12;
  const maxR = Math.min(w, h) * 0.42;
  const barCount = 96;
  const maxBin = Math.floor(data.length * 0.68);
  ctx.beginPath();
  ctx.arc(cx, cy, innerR - 1, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(26,21,53,0.4)';
  ctx.fill();
  ctx.shadowColor = 'rgba(129,140,248,0.25)';
  ctx.shadowBlur = 10;
  const lineW = Math.max(2, (Math.PI * 2 * innerR / barCount) * 0.7);
  for (let i = 0; i < barCount; i++) {
    const center = Math.floor(i * maxBin / barCount);
    const span = Math.max(1, Math.floor(maxBin / barCount));
    let sum = 0, count = 0;
    for (let j = Math.max(0, center - span); j <= Math.min(data.length - 1, center + span); j++) { sum += data[j]; count++; }
    const raw = Math.pow((sum / count) / 255, 0.75);
    const angle = (i / barCount) * Math.PI * 2 - Math.PI / 2;
    const freqScale = 0.6 + (i / barCount) * 0.8;
    const val = Math.min(1, raw * freqScale);
    const barLen = val * (maxR - innerR);
    const pct = i / barCount;
    const lightness = 55 + pct * 30;
    ctx.strokeStyle = `hsla(${240 + pct * 40}, 65%, ${lightness}%, ${0.35 + val * 0.55})`;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * innerR, cy + Math.sin(angle) * innerR);
    ctx.lineTo(cx + Math.cos(angle) * (innerR + barLen), cy + Math.sin(angle) * (innerR + barLen));
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.lineCap = 'butt';
}

function drawWave(ctx, w, h, timeData) {
  const mid = h / 2;
  const len = timeData.length;
  ctx.beginPath();
  for (let i = 0; i < len; i++) {
    const x = (i / (len - 1)) * w;
    const val = (timeData[i] - 128) / 128;
    const t = i / (len - 1);
    const taper = Math.sin(t * Math.PI);
    const y = mid + val * mid * 0.8 * taper;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = '#818cf8';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.shadowColor = 'rgba(129,140,248,0.4)';
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(0, mid);
  ctx.lineTo(w, mid);
  ctx.strokeStyle = 'rgba(148,163,184,0.1)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawEQ(ctx, w, h, freqData) {
  const mid = h / 2;
  const binHz = 44100 / 512;
  const minBin = Math.max(1, Math.ceil(10 / binHz));
  const maxBin = Math.min(Math.floor(16000 / binHz), freqData.length);
  const range = maxBin - minBin;
  const pts = [];
  for (let i = minBin; i < maxBin; i++) {
    const x = ((i - minBin) / (range - 1)) * w;
    const val = freqData[i] / 255;
    pts.push({ x, y: mid - val * mid * 0.85 });
  }
  const ptsBottom = pts.map(p => ({ x: p.x, y: mid + (mid - p.y) }));

  // Fill
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const cpx = (pts[i].x + pts[i + 1].x) / 2;
    const cpy = (pts[i].y + pts[i + 1].y) / 2;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, cpx, cpy);
  }
  ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
  ctx.lineTo(ptsBottom[ptsBottom.length - 1].x, ptsBottom[ptsBottom.length - 1].y);
  for (let i = ptsBottom.length - 2; i >= 1; i--) {
    const cpx = (ptsBottom[i].x + ptsBottom[i - 1].x) / 2;
    const cpy = (ptsBottom[i].y + ptsBottom[i - 1].y) / 2;
    ctx.quadraticCurveTo(ptsBottom[i].x, ptsBottom[i].y, cpx, cpy);
  }
  ctx.lineTo(ptsBottom[0].x, ptsBottom[0].y);
  ctx.closePath();
  const fillGrad = ctx.createLinearGradient(0, 0, w, 0);
  fillGrad.addColorStop(0, 'rgba(99,102,241,0.15)');
  fillGrad.addColorStop(0.4, 'rgba(168,85,247,0.12)');
  fillGrad.addColorStop(1, 'rgba(236,72,153,0.08)');
  ctx.fillStyle = fillGrad;
  ctx.fill();

  const grad = ctx.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0, '#6366f1');
  grad.addColorStop(0.5, '#a855f7');
  grad.addColorStop(1, '#ec4899');

  // Top stroke
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const cpx = (pts[i].x + pts[i + 1].x) / 2;
    const cpy = (pts[i].y + pts[i + 1].y) / 2;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, cpx, cpy);
  }
  ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = 'rgba(139,92,246,0.4)';
  ctx.shadowBlur = 10;
  ctx.stroke();

  // Bottom stroke
  ctx.beginPath();
  ctx.moveTo(ptsBottom[0].x, ptsBottom[0].y);
  for (let i = 1; i < ptsBottom.length - 1; i++) {
    const cpx = (ptsBottom[i].x + ptsBottom[i + 1].x) / 2;
    const cpy = (ptsBottom[i].y + ptsBottom[i + 1].y) / 2;
    ctx.quadraticCurveTo(ptsBottom[i].x, ptsBottom[i].y, cpx, cpy);
  }
  ctx.lineTo(ptsBottom[ptsBottom.length - 1].x, ptsBottom[ptsBottom.length - 1].y);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.beginPath();
  ctx.moveTo(0, mid);
  ctx.lineTo(w, mid);
  ctx.strokeStyle = 'rgba(148,163,184,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawSpectrograph(ctx, w, h, freqData, state) {
  const cw = Math.round(w);
  const ch = Math.round(h);
  if (!state.spectroCanvas || state.spectroCanvas.width !== cw || state.spectroCanvas.height !== ch) {
    state.spectroCanvas = document.createElement('canvas');
    state.spectroCanvas.width = cw;
    state.spectroCanvas.height = ch;
    state.spectroCol = 0;
  }
  const sctx = state.spectroCanvas.getContext('2d');
  const col = state.spectroCol % cw;
  const binHz = 44100 / 512;
  const minBin = Math.max(1, Math.ceil(10 / binHz));
  const maxBin = Math.min(Math.floor(16000 / binHz), freqData.length);
  const binCount = maxBin - minBin;

  for (let i = 0; i < binCount; i++) {
    const val = freqData[i + minBin] / 255;
    const y = Math.round((1 - i / binCount) * h);
    const barH = Math.max(Math.ceil(h / binCount), 1);
    let r, g, b;
    if (val < 0.25) {
      const t = val / 0.25;
      r = 0; g = Math.round(t * 40); b = Math.round(30 + t * 120);
    } else if (val < 0.5) {
      const t = (val - 0.25) / 0.25;
      r = 0; g = Math.round(40 + t * 180); b = Math.round(150 + t * 60);
    } else if (val < 0.75) {
      const t = (val - 0.5) / 0.25;
      r = Math.round(t * 255); g = Math.round(220 + t * 35); b = Math.round(210 - t * 160);
    } else {
      const t = (val - 0.75) / 0.25;
      r = 255; g = 255; b = Math.round(50 + t * 205);
    }
    sctx.fillStyle = `rgb(${r},${g},${b})`;
    sctx.fillRect(col, y, 1, barH);
  }
  state.spectroCol++;

  ctx.save();
  const colPx = (col + 1) % cw;
  if (colPx < cw) ctx.drawImage(state.spectroCanvas, colPx, 0, cw - colPx, ch, 0, 0, w - colPx, h);
  if (colPx > 0) ctx.drawImage(state.spectroCanvas, 0, 0, colPx, ch, w - colPx, 0, colPx, h);
  ctx.restore();

  // Freq labels
  ctx.fillStyle = 'rgba(148,163,184,0.5)';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  const labels = [100, 500, 1000, 2000, 5000, 10000];
  for (const freq of labels) {
    const bin = Math.round((freq - 10) / (16000 - 10) * binCount);
    const y = (1 - bin / binCount) * h;
    if (y < 15 || y > h - 5) continue;
    ctx.fillText(freq >= 1000 ? `${freq / 1000}k` : `${freq}`, 6, y + 4);
    ctx.fillRect(0, y, 3, 1);
  }

  ctx.strokeStyle = 'rgba(129,140,248,0.6)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(w - 1, 0);
  ctx.lineTo(w - 1, h);
  ctx.stroke();
}

function drawOrbit(ctx, w, h, data, now, dt, state) {
  if (!state.particles) state.particles = [];
  if (!state.ringIndex) state.ringIndex = 0;
  const particles = state.particles;

  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  const volume = sum / data.length / 255;

  let waveMax = 0;
  for (let i = 0; i < data.length; i++) {
    const v = Math.abs(data[i] - 128);
    if (v > waveMax) waveMax = v;
  }
  const waveIntensity = waveMax / 128;

  const cx = w / 2, cy = h / 2;
  const ringR = Math.min(w, h) * 0.25;
  const ringCapacity = 140;

  if (particles.length < ringCapacity) {
    const spawnRate = Math.max(1, Math.floor(Math.pow(volume, 0.3) * 6));
    for (let i = 0; i < spawnRate && particles.length < ringCapacity; i++) {
      const edge = Math.floor(Math.random() * 4);
      let sx, sy;
      if (edge === 0) { sx = Math.random() * w; sy = -10; }
      else if (edge === 1) { sx = Math.random() * w; sy = h + 10; }
      else if (edge === 2) { sx = -10; sy = Math.random() * h; }
      else { sx = w + 10; sy = Math.random() * h; }
      const angle = (state.ringIndex / ringCapacity) * Math.PI * 2 + (Math.random() - 0.5) * 0.08;
      const fg = Math.random() > 0.45;
      particles.push({
        x: sx, y: sy, vx: 0, vy: 0,
        ringAngle: angle,
        size: fg ? 2 + Math.random() * 3.5 : 0.8 + Math.random() * 1.8,
        opacity: fg ? 0.45 + Math.random() * 0.3 : 0.18 + Math.random() * 0.2,
        sizePhase: Math.random() * Math.PI * 2,
        birthTime: now, fg, settled: false,
      });
      state.ringIndex++;
    }
  }

  const rotX = now * 0.06, rotY = now * 0.045, rotZ = now * 0.03;
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  const cosZ = Math.cos(rotZ), sinZ = Math.sin(rotZ);

  const project3D = (angle, r) => {
    let x3 = Math.cos(angle) * r, y3 = Math.sin(angle) * r, z3 = 0;
    const y1 = y3 * cosX - z3 * sinX;
    const z1 = y3 * sinX + z3 * cosX;
    const x2 = x3 * cosY + z1 * sinY;
    const z2 = -x3 * sinY + z1 * cosY;
    const xf = x2 * cosZ - y1 * sinZ;
    const yf = x2 * sinZ + y1 * cosZ;
    const perspective = 600;
    const scale = perspective / (perspective + z2);
    return { x: cx + xf * scale, y: cy + yf * scale, z: z2, scale };
  };

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const pulseR = ringR * (1 + volume * 0.12);
    const orbitSpeed = p.fg ? 0.025 : -0.018;
    p.ringAngle += orbitSpeed * dt;
    const vibrate = waveIntensity * 8 * Math.sin(now * 25 + p.ringAngle * 5);
    const targetR = pulseR + vibrate;
    const proj = project3D(p.ringAngle, targetR);
    const springForce = p.settled ? 0.012 : 0.02;
    p.vx += (proj.x - p.x) * springForce;
    p.vy += (proj.y - p.y) * springForce;
    p.vx *= 0.94;
    p.vy *= 0.94;
    p.x += p.vx;
    p.y += p.vy;
    if (!p.settled) {
      const dx = p.x - proj.x, dy = p.y - proj.y;
      if (dx * dx + dy * dy < 25) p.settled = true;
    }
  }

  const sorted = particles.map((p, i) => {
    const proj = project3D(p.ringAngle, ringR);
    return { idx: i, z: proj.z };
  });
  sorted.sort((a, b) => a.z - b.z);

  ctx.shadowColor = 'rgba(129,140,248,0.2)';
  ctx.shadowBlur = 6;
  for (const { idx } of sorted) {
    const p = particles[idx];
    const proj = project3D(p.ringAngle, ringR);
    const depthAlpha = 0.4 + 0.6 * ((proj.z + ringR) / (2 * ringR));
    const age = now - p.birthTime;
    const sizeMultiplier = 0.7 + 0.3 * Math.sin(age * 2.5 + p.sizePhase);
    const drawSize = p.size * sizeMultiplier * (1 + volume * 0.15) * proj.scale;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, drawSize), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(129,140,248,${(p.opacity * Math.max(0.2, depthAlpha)).toFixed(2)})`;
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawSphere(ctx, w, h, data, sphereTime) {
  const cx = w / 2, cy = h / 2;
  const baseR = Math.min(w, h) * 0.24;
  const t = sphereTime;
  const rotY = t * 0.12;
  const rotZ = t * 0.07;

  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  const avg = sum / data.length / 255;

  const glowR = baseR * (1.1 + avg * 0.3);
  const glow = ctx.createRadialGradient(cx, cy, baseR * 0.2, cx, cy, glowR);
  glow.addColorStop(0, `rgba(99,102,241,${0.12 + avg * 0.15})`);
  glow.addColorStop(0.6, `rgba(129,140,248,${0.04 + avg * 0.06})`);
  glow.addColorStop(1, 'rgba(67,56,202,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
  ctx.fill();

  const project = (x3, y3, z3) => {
    let x1 = x3 * Math.cos(rotY) + z3 * Math.sin(rotY);
    let z1 = -x3 * Math.sin(rotY) + z3 * Math.cos(rotY);
    let x2 = x1 * Math.cos(rotZ) - y3 * Math.sin(rotZ);
    let y2 = x1 * Math.sin(rotZ) + y3 * Math.cos(rotZ);
    let z2 = z1;
    const scale = 1 / (1 + z2 / (baseR * 4));
    return { sx: cx + x2 * scale, sy: cy + y2 * scale, z: z2 };
  };

  ctx.lineWidth = 1.2;
  ctx.lineCap = 'round';

  const maxBin = Math.floor(data.length * 0.68);
  const bassEnd = Math.floor(maxBin * 0.2);
  const midEnd = Math.floor(maxBin * 0.55);
  let bassSum = 0, midSum = 0, highSum = 0;
  for (let i = 0; i < bassEnd; i++) bassSum += data[i];
  for (let i = bassEnd; i < midEnd; i++) midSum += data[i];
  for (let i = midEnd; i < maxBin; i++) highSum += data[i];
  const bassAvg = bassSum / bassEnd / 255;
  const midAvg = midSum / (midEnd - bassEnd) / 255;
  const highAvg = highSum / (maxBin - midEnd) / 255;
  const baseDistort = 0.3 + avg * 0.8;
  const rippleStrength = avg * 0.15;

  // Longitude lines
  const lonLines = 16, lonPts = 48;
  for (let l = 0; l < lonLines; l++) {
    const phi = (l / lonLines) * Math.PI;
    ctx.beginPath();
    for (let i = 0; i <= lonPts; i++) {
      const theta = (i / lonPts) * Math.PI * 2;
      const vertPos = Math.abs(Math.cos(theta));
      const bandVal = bassAvg * (1 - vertPos) + highAvg * vertPos + midAvg * 0.5;
      const halfPts = lonPts / 2;
      const mirrorI = i <= halfPts ? i : lonPts - i;
      const freqIdx = Math.floor((mirrorI / halfPts) * maxBin);
      const pointVal = data[Math.min(freqIdx, maxBin - 1)] / 255;
      const combined = bandVal * 0.6 + pointVal * 0.4;
      const ripple = rippleStrength * Math.sin(theta * 8 + phi * 6 + t * 4) * Math.sin(phi * 4 - t * 3);
      const r = baseR * (1 + combined * baseDistort * 0.5 + ripple);
      const x3 = r * Math.sin(theta) * Math.cos(phi);
      const y3 = r * Math.cos(theta);
      const z3 = r * Math.sin(theta) * Math.sin(phi);
      const { sx, sy } = project(x3, y3, z3);
      if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    const depthPt = project(Math.cos(phi) * baseR, 0, Math.sin(phi) * baseR);
    const depth = depthPt.z / baseR;
    const alpha = 0.15 + depth * 0.2 + avg * 0.3;
    ctx.strokeStyle = `rgba(129,140,248,${Math.max(0.05, alpha)})`;
    ctx.stroke();
  }

  // Latitude lines
  const latLines = 10, latPts = 64;
  for (let l = 1; l < latLines; l++) {
    const theta = (l / latLines) * Math.PI;
    const latR = baseR * Math.sin(theta);
    const latY = baseR * Math.cos(theta);
    const vertPos = Math.abs(Math.cos(theta));
    const latBandVal = bassAvg * (1 - vertPos) + highAvg * vertPos + midAvg * 0.5;
    ctx.beginPath();
    for (let i = 0; i <= latPts; i++) {
      const phi = (i / latPts) * Math.PI * 2;
      const halfPts = latPts / 2;
      const mirrorI = i <= halfPts ? i : latPts - i;
      const freqIdx = Math.floor((mirrorI / halfPts) * maxBin);
      const pointVal = data[Math.min(freqIdx, maxBin - 1)] / 255;
      const combined = latBandVal * 0.6 + pointVal * 0.4;
      const ripple = rippleStrength * Math.sin(theta * 8 + phi * 6 + t * 4) * Math.sin(phi * 4 - t * 3);
      const r = latR * (1 + combined * baseDistort * 0.5 + ripple);
      const x3 = r * Math.cos(phi);
      const z3 = r * Math.sin(phi);
      const { sx, sy } = project(x3, latY, z3);
      if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    const alpha = 0.1 + avg * 0.35;
    ctx.strokeStyle = `rgba(167,139,250,${alpha})`;
    ctx.stroke();
  }
}

function drawGrid(ctx, w, h, data, now, state) {
  const cols = 24, rows = 14;
  const marginX = w * 0.08, marginY = h * 0.08;
  const spacingX = (w - marginX * 2) / (cols - 1);
  const spacingY = (h - marginY * 2) / (rows - 1);

  if (!state.grid || state.grid.length !== cols * rows) {
    state.grid = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        state.grid.push({
          homeX: marginX + c * spacingX,
          homeY: marginY + r * spacingY,
          x: marginX + c * spacingX,
          y: marginY + r * spacingY,
          vx: 0, vy: 0, col: c, row: r,
        });
      }
    }
  }
  const grid = state.grid;

  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  const volume = sum / data.length / 255;
  const boostedVol = Math.pow(volume, 0.6);

  const third = Math.floor(data.length / 3);
  let bassSum = 0, midSum = 0, highSum = 0;
  for (let i = 0; i < third; i++) bassSum += data[i];
  for (let i = third; i < third * 2; i++) midSum += data[i];
  for (let i = third * 2; i < data.length; i++) highSum += data[i];
  const bass = bassSum / third / 255;
  const mid = midSum / third / 255;
  const high = highSum / (data.length - third * 2) / 255;

  const maxDisplace = Math.min(spacingX, spacingY) * 0.8;
  for (let i = 0; i < grid.length; i++) {
    const p = grid[i];
    const nx = p.col / (cols - 1);
    const ny = p.row / (rows - 1);
    const bassWave = bass * maxDisplace * 0.7 * Math.sin(now * 1.5 + nx * Math.PI * 2);
    const midWave = mid * maxDisplace * 0.5 * Math.sin(now * 3 + (nx + ny) * Math.PI * 3);
    const highShimmer = high * maxDisplace * 0.3 * Math.sin(now * 8 + p.col * 1.2 + p.row * 0.9);
    const vibX = midWave * 0.7 + highShimmer + boostedVol * 4 * Math.sin(now * 2.5 + p.col * 0.6);
    const vibY = bassWave + midWave * 0.5 + boostedVol * 3 * Math.cos(now * 1.8 + p.row * 0.7);
    const targetX = p.homeX + vibX;
    const targetY = p.homeY + vibY;
    p.vx += (targetX - p.x) * 0.04;
    p.vy += (targetY - p.y) * 0.04;
    p.vx *= 0.88;
    p.vy *= 0.88;
    p.x += p.vx;
    p.y += p.vy;
  }

  ctx.shadowColor = `rgba(129,140,248,${(0.1 + boostedVol * 0.25).toFixed(2)})`;
  ctx.shadowBlur = 4 + boostedVol * 6;
  for (let i = 0; i < grid.length; i++) {
    const p = grid[i];
    const dx = p.x - p.homeX, dy = p.y - p.homeY;
    const displacement = Math.sqrt(dx * dx + dy * dy) / maxDisplace;
    const size = 1.5 + boostedVol * 3.5 + displacement * 1.5;
    const alpha = 0.25 + boostedVol * 0.45 + displacement * 0.15;
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(129,140,248,${Math.min(1, alpha).toFixed(2)})`;
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawLaser(ctx, w, h, timeData, freqData, now) {
  const cx = w / 2, cy = h / 2;

  // Black bg
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);

  let sum = 0;
  for (let i = 0; i < freqData.length; i++) sum += freqData[i];
  const volume = sum / freqData.length / 255;
  const rawAmp = Math.pow(volume, 0.3);
  const amp = Math.min(Math.max(rawAmp, 0.35), 0.85);

  const len = timeData.length;
  const offset = Math.floor(len * 0.25);
  const radius = Math.max(Math.min(w, h) * 0.45 * amp, 50);
  const rot = now * 0.3;
  const cosR = Math.cos(rot), sinR = Math.sin(rot);

  const raw = [];
  const step = 2, avgW = 4;
  for (let i = 0; i < len; i += step) {
    let xSum = 0, ySum = 0, count = 0;
    for (let j = -avgW; j <= avgW; j++) {
      const idx = ((i + j) % len + len) % len;
      const oIdx = ((i + j + offset) % len + len) % len;
      xSum += (timeData[idx] - 128) / 128;
      ySum += (timeData[oIdx] - 128) / 128;
      count++;
    }
    const xi = xSum / count, yi = ySum / count;
    const rx = xi * cosR - yi * sinR;
    const ry = xi * sinR + yi * cosR;
    raw.push({ x: cx + rx * radius, y: cy + ry * radius });
  }

  const pts = raw.map((p, i) => {
    const prev = raw[(i - 1 + raw.length) % raw.length];
    const next = raw[(i + 1) % raw.length];
    return { x: prev.x * 0.2 + p.x * 0.6 + next.x * 0.2, y: prev.y * 0.2 + p.y * 0.6 + next.y * 0.2 };
  });

  if (pts.length < 2) return;

  const drawSmooth = () => {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 0; i < pts.length - 1; i++) {
      const mx = (pts[i].x + pts[i + 1].x) / 2;
      const my = (pts[i].y + pts[i + 1].y) / 2;
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
    }
    ctx.quadraticCurveTo(pts[pts.length - 1].x, pts[pts.length - 1].y, pts[0].x, pts[0].y);
  };

  const laserHue = 268 + Math.sin(now * 0.4) * 12;
  const brightness = 0.4 + amp * 0.6;

  // Outer glow
  drawSmooth();
  ctx.strokeStyle = `hsla(${laserHue}, 85%, 55%, ${brightness * 0.3})`;
  ctx.lineWidth = 6 + amp * 4;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = `hsla(${laserHue}, 90%, 65%, ${brightness * 0.5})`;
  ctx.shadowBlur = 20 + amp * 15;
  ctx.stroke();

  // Mid glow
  drawSmooth();
  ctx.strokeStyle = `hsla(${laserHue - 5}, 80%, 70%, ${brightness * 0.6})`;
  ctx.lineWidth = 2.5 + amp * 2;
  ctx.shadowBlur = 8 + amp * 8;
  ctx.stroke();

  // Core
  drawSmooth();
  ctx.strokeStyle = `hsla(${laserHue + 10}, 40%, 92%, ${brightness * 0.9})`;
  ctx.lineWidth = 1 + amp * 0.8;
  ctx.shadowColor = `hsla(${laserHue}, 70%, 85%, ${brightness})`;
  ctx.shadowBlur = 4;
  ctx.stroke();

  // Head dot
  const headIdx = Math.floor((now * 80) % pts.length);
  const head = pts[headIdx];
  ctx.beginPath();
  ctx.arc(head.x, head.y, 2 + amp * 3, 0, Math.PI * 2);
  ctx.fillStyle = `hsla(${laserHue + 10}, 30%, 95%, ${brightness})`;
  ctx.shadowColor = `hsla(${laserHue}, 80%, 75%, 1)`;
  ctx.shadowBlur = 15 + amp * 10;
  ctx.fill();
  ctx.shadowBlur = 0;
}

// --- Animation loop ---
let lastTime = 0;
let vizTime = 0;

function animate(timestamp) {
  const realNow = timestamp / 1000;
  const dt = lastTime > 0 ? Math.min(realNow - lastTime, 0.1) : 0.016;
  lastTime = realNow;
  vizTime += dt;

  const freqData = generateFreqData(vizTime);
  const timeData = generateTimeData(vizTime);

  for (const cell of cells) {
    const { mode, ctx, state } = cell;
    const w = CW, h = CH;

    if (mode === 'Laser') {
      drawLaser(ctx, w, h, timeData, freqData, vizTime);
    } else if (mode === 'Spectrograph') {
      // Spectrograph uses its own bg (the heatmap fills it)
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, w, h);
      drawSpectrograph(ctx, w, h, freqData, state);
    } else {
      drawBackground(ctx, w, h, vizTime, freqData);
      if (mode === 'Bars') drawBars(ctx, w, h, freqData);
      else if (mode === 'Radial') drawRadial(ctx, w, h, freqData);
      else if (mode === 'Wave') drawWave(ctx, w, h, timeData);
      else if (mode === 'EQ') drawEQ(ctx, w, h, freqData);
      else if (mode === 'Orbit') drawOrbit(ctx, w, h, freqData, vizTime, dt, state);
      else if (mode === 'Sphere') drawSphere(ctx, w, h, freqData, vizTime);
      else if (mode === 'Grid') drawGrid(ctx, w, h, freqData, vizTime, state);
    }
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
